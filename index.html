<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#2d6a4f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="동선플래너">
<link rel="manifest" href="/manifest.json">
<title>청소 동선 플래너</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d8;
  --text: #1a1a1a; --text-muted: #7a7870;
  --accent: #2d6a4f; --accent-light: #e8f4ee;
  --accent-2: #e76f51; --accent-2-light: #fdf0ec;
  --radius: 12px; --radius-sm: 8px;
}
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
header { background: var(--accent); padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; color: white; }
.logo-icon { width: 28px; height: 28px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.logo-icon svg { fill: white; }
.header-hint { font-size: 11px; color: rgba(255,255,255,0.7); }
.main { display: grid; grid-template-columns: 380px 1fr; flex: 1; min-height: 0; height: calc(100vh - 56px); }
.panel { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.panel-scroll { flex: 1; overflow-y: auto; padding: 20px; }
#map { width: 100%; height: 100%; }
.map-wrap { position: relative; flex: 1; }
@media (max-width: 768px) {
  .main { display: flex; flex-direction: column; height: auto; }
  .panel { border-right: none; border-bottom: 1px solid var(--border); max-height: none; overflow: visible; }
  .panel-scroll { overflow: visible; padding: 16px; }
  .map-wrap { height: 340px; flex-shrink: 0; }
  .header-hint { display: none; }
  .field-row { grid-template-columns: 1fr 70px; }
}
.section { margin-bottom: 20px; }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.addr-wrap { position: relative; }
.addr-wrap input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; color: var(--text); background: var(--surface); outline: none; -webkit-appearance: none; }
.addr-wrap input:focus { border-color: var(--accent); }
.dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 999; display: none; max-height: 220px; overflow-y: auto; }
.dropdown.show { display: block; }
.dropdown-item { padding: 11px 12px; font-size: 14px; cursor: pointer; border-bottom: 0.5px solid var(--border); line-height: 1.4; }
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover, .dropdown-item:active { background: var(--accent-light); }
.dropdown-item .addr-main { color: var(--text); font-weight: 500; }
.dropdown-item .addr-sub { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
.field-row { display: grid; grid-template-columns: 1fr 80px; gap: 8px; }
.field input[type="time"], .field input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; color: var(--text); background: var(--surface); outline: none; -webkit-appearance: none; }
.same-dest { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 13px; color: var(--text-muted); cursor: pointer; }
.same-dest input[type="checkbox"] { width: 18px; height: 18px; }

/* 드래그앤드롭 스타일링 보강 */
.loc-list { display: flex; flex-direction: column; gap: 10px; }
.loc-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; background: var(--surface); cursor: grab; transition: transform 0.15s, background-color 0.15s; }
.loc-card:active { cursor: grabbing; }
.loc-card.dragging { opacity: 0.4; background-color: var(--accent-light); transform: scale(0.98); }

.loc-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.loc-num { width: 28px; height: 28px; border-radius: 50%; color: white; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; user-select: none; }
.loc-name-wrap { flex: 1; position: relative; }
.loc-name-input { width: 100%; border: none; border-bottom: 1.5px solid transparent; padding: 2px 4px; font-size: 15px; font-weight: 600; background: transparent; outline: none; color: var(--text); cursor: text; transition: border-color 0.15s; }
.loc-name-input:hover { border-bottom-color: var(--border); }
.loc-name-input:focus { border-bottom-color: var(--accent); background: var(--bg); border-radius: 4px 4px 0 0; }
.edit-hint { font-size: 10px; color: var(--text-muted); margin-top: 1px; display: none; }
.loc-name-input:focus ~ .edit-hint { display: block; }
