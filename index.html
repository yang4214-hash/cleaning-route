<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#2d6a4f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="동선플래너">
<link rel="manifest" href="/manifest.json">
<title>청소 동선 플래너</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d8;
  --text: #1a1a1a; --text-muted: #7a7870;
  --accent: #2d6a4f; --accent-light: #e8f4ee;
  --accent-2: #e76f51; --accent-2-light: #fdf0ec;
  --radius: 12px; --radius-sm: 8px;
  --result-w: 300px;
}
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
header { background: var(--accent); padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 10; }
.logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; color: white; }
.logo-icon { width: 28px; height: 28px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.logo-icon svg { fill: white; }
.header-hint { font-size: 11px; color: rgba(255,255,255,0.7); }

/* ── 메인 레이아웃 ── */
.main { display: flex; flex: 1; min-height: 0; height: calc(100vh - 56px); }
.input-panel { width: 360px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; z-index: 5; }
.input-scroll { flex: 1; overflow-y: auto; padding: 20px; }

/* 결과 패널 */
.result-panel { width: var(--result-w); flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: none; flex-direction: column; overflow: hidden; z-index: 5; }
.result-panel.show { display: flex; }
.result-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.result-panel-title { font-size: 13px; font-weight: 700; color: var(--text); }
.btn-close-result { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 20px; line-height: 1; padding: 2px; }
.result-scroll { flex: 1; overflow-y: auto; padding: 14px 16px; }

/* 지도 */
.map-wrap { position: relative; flex: 1; min-width: 0; min-height: 0; }
#map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.map-click-hint { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(45,106,79,0.92); color: white; padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 600; z-index: 10; display: none; pointer-events: none; white-space: nowrap; }
.map-click-hint.show { display: block; }

/* 모바일 */
@media (max-width: 768px) {
  .main { flex-direction: column; height: auto; }
  .input-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); overflow: visible; }
  .input-scroll { overflow: visible; padding: 16px; }
  .result-panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
  .map-wrap { height: 280px; flex-shrink: 0; }
  .header-hint { display: none; }
  .field-row { grid-template-columns: 1fr 70px; }
  .mobile-minimap { display: block !important; }
}
.mobile-minimap { display: none; margin: 0 0 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }

/* 공통 폼 */
.section { margin-bottom: 18px; }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.section-header .section-label { margin-bottom: 0; }
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.addr-wrap { position: relative; }
.addr-wrap input, .field input[type="time"], .field input[type="text"], .field input[type="number"] {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 14px; color: var(--text); background: var(--surface); outline: none; -webkit-appearance: none;
}
.addr-wrap input:focus, .field input:focus { border-color: var(--accent); }
.dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 999; display: none; max-height: 200px; overflow-y: auto; }
.dropdown.show { display: block; }
.dropdown-item { padding: 10px 12px; font-size: 13px; cursor: pointer; border-bottom: 0.5px solid var(--border); line-height: 1.4; }
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover { background: var(--accent-light); }
.dropdown-item .addr-main { font-weight: 500; }
.dropdown-item .addr-sub { color: var(--text-muted); font-size: 11px; margin-top: 2px; }
.field-row { display: grid; grid-template-columns: 1fr 80px; gap: 8px; }

/* 도착지 라디오 */
.dest-options { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.dest-option { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); cursor: pointer; padding: 2px 0; }
.dest-option input[type="radio"] { width: 16px; height: 16px; accent-color: var(--accent); }
.dest-option.selected { color: var(--accent); font-weight: 600; }

/* 현장 카드 */
.loc-list { display: flex; flex-direction: column; gap: 8px; }
.loc-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; background: var(--surface); }
.loc-card.sortable-ghost { opacity: 0.4; background: var(--accent-light); }
.loc-card.sortable-chosen { box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
.loc-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.drag-handle { cursor: grab; color: #ccc; font-size: 14px; flex-shrink: 0; user-select: none; }
.drag-handle:active { cursor: grabbing; }
.loc-num { width: 24px; height: 24px; border-radius: 50%; color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.loc-name-input { flex: 1; border: none; border-bottom: 1.5px solid transparent; padding: 2px 4px; font-size: 14px; font-weight: 600; background: transparent; outline: none; color: var(--text); }
.loc-name-input:hover { border-bottom-color: var(--border); }
.loc-name-input:focus { border-bottom-color: var(--accent); background: var(--bg); border-radius: 4px 4px 0 0; }
.btn-rm { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 20px; line-height: 1; padding: 2px; flex-shrink: 0; }
.btn-rm:hover { color: var(--accent-2); }
.loc-addr-field { width: 100%; padding: 9px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; margin-bottom: 6px; outline: none; -webkit-appearance: none; }
.loc-addr-field:focus { border-color: var(--accent); }
.loc-footer { display: flex; align-items: center; gap: 6px; }
.loc-footer label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.dur-input { width: 60px; padding: 6px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; text-align: center; outline: none; -webkit-appearance: none; }

/* 버튼 */
.btn-add { width: 100%; padding: 10px; border: 1.5px dashed var(--border); border-radius: var(--radius-sm); background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer; }
.btn-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.btn-row { display: flex; gap: 8px; margin-top: 8px; }
.btn-tsp { flex: 1; padding: 10px 8px; border: 1px solid var(--accent); border-radius: var(--radius-sm); background: var(--accent-light); color: var(--accent); font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-tsp:hover { background: var(--accent); color: white; }
.btn-tsp:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-map-add { padding: 5px 10px; border: 1px solid var(--accent); border-radius: 20px; background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.btn-map-add.active { background: var(--accent); color: white; }
.btn-calc { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-calc:disabled { opacity: 0.5; cursor: not-allowed; }
.save-notice { font-size: 11px; color: var(--accent); background: var(--accent-light); padding: 6px 10px; border-radius: 6px; margin-top: 6px; text-align: center; }

/* 로딩/에러 */
.loading-bar { display: none; align-items: center; gap: 8px; padding: 10px 16px; background: var(--accent-light); border-top: 1px solid var(--border); font-size: 12px; color: var(--accent); flex-shrink: 0; }
.loading-bar.show { display: flex; }
.spinner { width: 14px; height: 14px; border: 2px solid var(--accent-light); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-msg { display: none; padding: 10px 16px; background: var(--accent-2-light); border-top: 1px solid #f5c6bb; font-size: 12px; color: var(--accent-2); flex-shrink: 0; }
.error-msg.show { display: block; }

/* 결과 패널 내부 */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 14px; }
.stat { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 6px; text-align: center; }
.stat-val { font-size: 15px; font-weight: 700; color: var(--accent); }
.stat-lbl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.timeline { display: flex; flex-direction: column; margin-bottom: 14px; }
.tl-item { display: flex; gap: 8px; }
.tl-left { display: flex; flex-direction: column; align-items: center; width: 16px; flex-shrink: 0; }
.tl-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.tl-line { flex: 1; width: 2px; background: var(--border); min-height: 6px; }
.tl-body { flex: 1; padding-bottom: 12px; }
.tl-name { font-size: 13px; font-weight: 600; }
.tl-detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.5; }
.share-btns { display: flex; flex-direction: column; gap: 6px; }
.share-btn { width: 100%; padding: 10px 8px; border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn-kakao { background: #FEE500; color: #3A1D1D; }
.btn-kakaomap { background: #3A1D1D; color: #FEE500; }
.btn-link { background: var(--accent); color: white; }
.btn-text { background: var(--accent-light); color: var(--accent); }

/* PWA / 토스트 */
.install-banner { display: none; background: var(--accent); color: white; padding: 10px 20px; font-size: 13px; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; }
.install-banner.show { display: flex; }
.install-btn { background: white; color: var(--accent); border: none; border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 700; cursor: pointer; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 9999; display: none; white-space: nowrap; }
.toast.show { display: block; animation: fadeInOut 2.5s forwards; }
@keyframes fadeInOut { 0%{opacity:0} 10%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>

<div class="install-banner" id="install-banner">
  <span>📱 홈 화면에 앱으로 추가하세요!</span>
  <button class="install-btn" id="install-btn">추가하기</button>
  <button style="background:none;border:none;color:white;font-size:20px;cursor:pointer;padding:0 4px" onclick="document.getElementById('install-banner').classList.remove('show')">×</button>
</div>

<header>
  <div class="logo">
    <div class="logo-icon"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
    청소 동선 플래너
  </div>
  <span class="header-hint">카카오 지도 기반</span>
</header>

<div class="main">
  <!-- 입력 패널 -->
  <div class="input-panel">
    <div class="input-scroll">

      <div class="section">
        <div class="section-label">출발 정보</div>
        <div class="field">
          <label>출발지 주소</label>
          <div class="addr-wrap">
            <input type="text" id="home-addr" placeholder="주소 검색..." autocomplete="off">
            <div class="dropdown" id="home-dropdown"></div>
          </div>
        </div>
        <div class="field-row">
          <div class="field" style="margin:0"><label>출발 시간</label><input type="time" id="departure" value="09:00"></div>
          <div class="field" style="margin:0"><label>여유(분)</label><input type="number" id="buffer" value="0" min="0" max="120" style="text-align:center"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">도착 정보</div>
        <div class="dest-options">
          <label class="dest-option">
            <input type="radio" name="dest-type" value="home" checked onchange="onDestTypeChange()">
            출발지와 동일 (귀가)
          </label>
          <label class="dest-option">
            <input type="radio" name="dest-type" value="last" onchange="onDestTypeChange()">
            마지막 현장이 도착지
          </label>
          <label class="dest-option">
            <input type="radio" name="dest-type" value="custom" onchange="onDestTypeChange()">
            별도 도착지 지정
          </label>
        </div>
        <div id="dest-field" style="display:none;margin-top:10px;">
          <div class="field" style="margin:0">
            <label>도착지 주소</label>
            <div class="addr-wrap">
              <input type="text" id="dest-addr" placeholder="주소 검색..." autocomplete="off">
              <div class="dropdown" id="dest-dropdown"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-label">현장 목록</div>
          <button class="btn-map-add" id="btn-map-add" onclick="toggleMapClick()">📍 지도 추가</button>
        </div>
        <div class="loc-list" id="loc-list"></div>
        <div class="btn-row">
          <button class="btn-add" onclick="addLoc()" style="margin:0">+ 현장 추가</button>
          <button class="btn-tsp" id="btn-tsp" onclick="autoSort()">🔀 최적 순서</button>
        </div>
        <div class="save-notice">💾 현장 목록은 자동 저장됩니다</div>
      </div>
    </div>

    <div class="loading-bar" id="loading"><div class="spinner"></div><span id="loading-text">경로 계산 중...</span></div>
    <div class="error-msg" id="error-msg"></div>
    <div style="padding:14px 16px;border-top:1px solid var(--border);flex-shrink:0;">
      <button class="btn-calc" id="btn-calc" onclick="calculate()">최적 동선 계산하기</button>
    </div>
  </div>

  <!-- 결과 패널 -->
  <div class="result-panel" id="result-panel">
    <div class="result-panel-header">
      <div class="result-panel-title">📋 계산 결과</div>
      <button class="btn-close-result" onclick="closeResult()">×</button>
    </div>
    <div class="result-scroll">
      <div class="mobile-minimap" id="mobile-minimap">
        <svg id="mini-map" width="100%" height="160" style="display:block;"></svg>
      </div>
      <div class="stats" id="stats"></div>
      <div class="timeline" id="timeline"></div>
      <div class="share-btns">
        <button class="share-btn btn-kakao" onclick="shareKakao()">💬 카카오톡 공유</button>
        <button class="share-btn btn-kakaomap" onclick="openKakaoMap()">🗺 카카오맵으로 보기</button>
        <button class="share-btn btn-link" onclick="copyLink()">🔗 링크 복사</button>
        <button class="share-btn btn-text" onclick="copyText()">📋 텍스트 복사</button>
      </div>
    </div>
  </div>

  <!-- 지도 -->
  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-click-hint" id="map-click-hint">지도를 클릭하면 현장이 추가됩니다</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<script>
const KAKAO_KEY = '18917cb7a54fccdb0bce1d1351c3eb62';
const COLORS = ['#2d6a4f','#e76f51','#457b9d','#e9c46a','#6d597a','#3a86ff','#fb8500','#2ec4b6','#e63946','#606c38'];

let locs = [], nextId = 1, colorIdx = 0;
let map, customOverlays = [], polylines = [], infoOverlays = [];
let geocoder;
let lastResult = null;
let deferredPrompt = null;
let mapClickMode = false;
let sortable = null;

// PWA
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt(); await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
});
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
if (window.Kakao && !Kakao.isInitialized()) Kakao.init(KAKAO_KEY);

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.remove('show');
  void t.offsetWidth; t.classList.add('show');
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 도착지 타입
function getDestType() {
  return document.querySelector('input[name="dest-type"]:checked').value;
}
function onDestTypeChange() {
  const t = getDestType();
  document.getElementById('dest-field').style.display = t === 'custom' ? 'block' : 'none';
  updateDestOptionStyles();
  saveData();
}
function updateDestOptionStyles() {
  const t = getDestType();
  document.querySelectorAll('.dest-option').forEach(el => {
    const val = el.querySelector('input').value;
    el.classList.toggle('selected', val === t);
  });
}

function closeResult() {
  document.getElementById('result-panel').classList.remove('show');
  if (map) { setTimeout(() => { map.relayout(); }, 100); }
}

// 저장/불러오기
function saveData() {
  try {
    localStorage.setItem('cleaning_locs', JSON.stringify(locs));
    localStorage.setItem('cleaning_home', document.getElementById('home-addr').value);
    localStorage.setItem('cleaning_dep',  document.getElementById('departure').value);
    localStorage.setItem('cleaning_buf',  document.getElementById('buffer').value);
    localStorage.setItem('cleaning_dest_type', getDestType());
    localStorage.setItem('cleaning_dest', document.getElementById('dest-addr').value);
  } catch(e) {}
}

function loadData() {
  const params = new URLSearchParams(location.search);
  if (params.get('share') === '1') { loadFromUrl(params); return; }
  try {
    const saved = localStorage.getItem('cleaning_locs');
    if (saved) {
      locs = JSON.parse(saved);
      locs.forEach((l,i) => { if (!l.color) l.color = COLORS[i % COLORS.length]; });
      nextId = locs.length ? Math.max(...locs.map(l=>l.id))+1 : 1;
      colorIdx = locs.length;
    } else {
      locs = [{id:1,name:'A 현장',addr:'',dur:60,color:COLORS[0]},{id:2,name:'B 현장',addr:'',dur:60,color:COLORS[1]}];
      nextId=3; colorIdx=2;
    }
    const v = k => localStorage.getItem(k);
    if (v('cleaning_home')) document.getElementById('home-addr').value = v('cleaning_home');
    if (v('cleaning_dep'))  document.getElementById('departure').value = v('cleaning_dep');
    if (v('cleaning_buf'))  document.getElementById('buffer').value    = v('cleaning_buf');
    if (v('cleaning_dest')) document.getElementById('dest-addr').value = v('cleaning_dest');
    const dt = v('cleaning_dest_type');
    if (dt) {
      const radio = document.querySelector(`input[name="dest-type"][value="${dt}"]`);
      if (radio) { radio.checked = true; onDestTypeChange(); }
    }
  } catch(e) {
    locs=[{id:1,name:'A 현장',addr:'',dur:60,color:COLORS[0]},{id:2,name:'B 현장',addr:'',dur:60,color:COLORS[1]}];
    nextId=3; colorIdx=2;
  }
  updateDestOptionStyles();
}

function loadFromUrl(params) {
  try {
    document.getElementById('home-addr').value = params.get('h')||'';
    document.getElementById('departure').value  = params.get('d')||'09:00';
    document.getElementById('buffer').value     = params.get('b')||'0';
    const dt = params.get('dt_type')||'home';
    const radio = document.querySelector(`input[name="dest-type"][value="${dt}"]`);
    if (radio) { radio.checked = true; onDestTypeChange(); }
    const dest = params.get('dt')||'';
    if (dest) document.getElementById('dest-addr').value = dest;
    const raw = params.get('l')||'';
    if (raw) {
      locs = raw.split('|').map((s,i) => {
        const p = s.split(';;');
        return {id:i+1, name:p[0]||`현장 ${i+1}`, addr:p[1]||'', dur:parseInt(p[2])||60, color:COLORS[i%COLORS.length]};
      });
      nextId = locs.length+1; colorIdx = locs.length;
    }
    updateDestOptionStyles();
    showToast('🔗 공유된 동선을 불러왔어요!');
    setTimeout(() => calculate(), 800);
  } catch(e) {}
}

function buildShareUrl() {
  const l = locs.map(loc=>`${loc.name};;${loc.addr};;${loc.dur}`).join('|');
  const p = new URLSearchParams({
    share:'1',
    h: document.getElementById('home-addr').value.trim(),
    d: document.getElementById('departure').value,
    b: document.getElementById('buffer').value,
    dt_type: getDestType(),
    dt: document.getElementById('dest-addr').value.trim(),
    l
  });
  return `${location.origin}${location.pathname}?${p.toString()}`;
}

// 카카오맵 경유지 URL
function buildKakaoMapUrl() {
  if (!lastResult) return '';
  const {orderedAddrs, destAddr, destType} = lastResult;
  if (!orderedAddrs || orderedAddrs.length === 0) return '';
  const origin = encodeURIComponent(document.getElementById('home-addr').value.trim());
  const waypoints = orderedAddrs.slice(0, -1).map(a => encodeURIComponent(a)).join(',');
  const lastAddr = orderedAddrs[orderedAddrs.length-1];
  const destination = destType === 'last'
    ? encodeURIComponent(lastAddr)
    : encodeURIComponent(destAddr || document.getElementById('home-addr').value.trim());
  if (waypoints) {
    return `https://map.kakao.com/route/car?origin=${origin}&waypoints=${waypoints}&destination=${destination}`;
  } else {
    return `https://map.kakao.com/route/car?origin=${origin}&destination=${destination}`;
  }
}

function openKakaoMap() {
  const url = buildKakaoMapUrl();
  if (url) window.open(url, '_blank');
  else alert('먼저 동선을 계산해주세요.');
}

// 공유 텍스트
function buildShareText() {
  if (!lastResult) return '';
  const {dep, steps, totalTravel, totalWork, bufVal} = lastResult;
  const startTime = bufVal > 0 ? addMins(dep, bufVal) : dep;
  const shareUrl = buildShareUrl();
  let t = `🧹 오늘 청소 동선\n출발: ${startTime}`;
  if (bufVal > 0) t += ` (여유 ${bufVal}분 포함)`;
  t += '\n\n';
  t += `🏠 출발: ${steps[0].detail}\n`;
  for (let i = 1; i < steps.length - 1; i++) {
    const s = steps[i];
    t += `📍 ${s.name} ${s.travelInfo ? `이동 ${s.travelInfo}` : ''}\n   ${s.detail}\n`;
  }
  const last = steps[steps.length-1];
  t += `\n🏁 ${last.name}: ${last.detail}\n`;
  t += `\n⏱ 이동 ${fmtMins(totalTravel)} + 작업 ${fmtMins(totalWork)}`;
  t += `\n\n🗺 동선 지도: ${shareUrl}`;
  return t;
}

// 주소 자동완성
function setupAddrSearch(inputId, dropdownId, onSelect) {
  const input = document.getElementById(inputId);
  const dd    = document.getElementById(dropdownId);
  if (!input||!dd) return;
  let timer;
  input.addEventListener('input', function() {
    clearTimeout(timer);
    const q = this.value.trim();
    if (q.length < 2) { dd.classList.remove('show'); return; }
    timer = setTimeout(() => doSearch(q, dd, input, onSelect), 300);
  });
  input.addEventListener('blur', () => setTimeout(()=>dd.classList.remove('show'),200));
}

function doSearch(query, dd, input, onSelect) {
  geocoder.addressSearch(query, (result, status) => {
    dd.innerHTML = '';
    if (status === kakao.maps.services.Status.OK && result.length > 0) {
      result.slice(0,5).forEach(item => {
        const road  = item.road_address ? item.road_address.address_name : '';
        const jibun = item.address      ? item.address.address_name      : '';
        const div   = document.createElement('div'); div.className='dropdown-item';
        div.innerHTML = `<div class="addr-main">${road||jibun}</div>${road&&jibun?`<div class="addr-sub">${jibun}</div>`:''}`;
        div.addEventListener('mousedown', ()=>{ input.value=road||jibun; dd.classList.remove('show'); onSelect(road||jibun); });
        dd.appendChild(div);
      });
      dd.classList.add('show');
    } else {
      new kakao.maps.services.Places().keywordSearch(query, (r,s) => {
        if (s===kakao.maps.services.Status.OK) {
          r.slice(0,5).forEach(item => {
            const div=document.createElement('div'); div.className='dropdown-item';
            div.innerHTML=`<div class="addr-main">${item.place_name}</div><div class="addr-sub">${item.road_address_name||item.address_name}</div>`;
            div.addEventListener('mousedown',()=>{ input.value=item.road_address_name||item.address_name; dd.classList.remove('show'); onSelect(item.road_address_name||item.address_name); });
            dd.appendChild(div);
          });
          if (r.length>0) dd.classList.add('show');
        }
      });
    }
  });
}

function initMap() {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.4563,127.1313), level:9
  });
  geocoder = new kakao.maps.services.Geocoder();
  kakao.maps.event.addListener(map, 'click', function(e) {

function toggleMapClick() {

function initSortable() {

function addLoc(addr) {
  const color = COLORS[colorIdx % COLORS.length]; colorIdx++;
  locs.push({id:nextId++, name:`현장 ${locs.length+1}`, addr:addr||'', dur:60, color});
  renderList(); saveData();
}
function removeLoc(id) {
  if (locs.length<=1) return alert('현장은 최소 1개 필요해요.');
  locs = locs.filter(l=>l.id!==id);
  renderList(); saveData();
}

function addMins(t, m) {
  const [h,mm] = t.split(':').map(Number);
  const tot = h*60 + mm + m;
  return `${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;
}
function fmtMins(m) {
  return m<60 ? `${m}분` : `${Math.floor(m/60)}시간${m%60>0?' '+m%60+'분':''}`;
}
function estimateMins(a,b) {
  const R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return Math.max(5,Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))/30*60));
}

async function getDirections(a,b) {
  try {
    const res=await fetch(`/api/directions?origin=${a.lng},${a.lat}&destination=${b.lng},${b.lat}`);
    const data=await res.json();
    if (data.routes&&data.routes[0]) {
      const route=data.routes[0];
      const duration=Math.round(route.summary.duration/60);
      const path=[];
      if (route.sections) route.sections.forEach(sec=>{
        if (sec.roads) sec.roads.forEach(road=>{
          if (road.vertexes) for(let i=0;i<road.vertexes.length;i+=2)
            path.push(new kakao.maps.LatLng(road.vertexes[i+1],road.vertexes[i]));
        });
      });
      return {duration,path};
    }
  } catch(e){}
  return {duration:estimateMins(a,b), path:[new kakao.maps.LatLng(a.lat,a.lng),new kakao.maps.LatLng(b.lat,b.lng)]};
}

function geocodeAddr(addr) {
  return new Promise((res,rej)=>{
    geocoder.addressSearch(addr,(r,s)=>{
      if(s===kakao.maps.services.Status.OK){res({lat:parseFloat(r[0].y),lng:parseFloat(r[0].x)});return;}
      new kakao.maps.services.Places().keywordSearch(addr,(r2,s2)=>{
        if(s2===kakao.maps.services.Status.OK) res({lat:parseFloat(r2[0].y),lng:parseFloat(r2[0].x)});
        else rej(new Error(`주소 못 찾음: ${addr}`));
      });
    });
  });
}

function clearMap() {
  [...customOverlays,...polylines,...infoOverlays].forEach(o=>o.setMap(null));
  customOverlays=[]; polylines=[]; infoOverlays=[];
}

function offsetPath(path, offsetPx) {
  if (!path||path.length<2) return path;
  return path.map((pt,i)=>{
    const prev=path[i>0?i-1:0], next=path[i<path.length-1?i+1:path.length-1];
    const dx=next.getLng()-prev.getLng(), dy=next.getLat()-prev.getLat();
    const len=Math.sqrt(dx*dx+dy*dy)||1;
    return new kakao.maps.LatLng(pt.getLat()+(dx/len)*offsetPx*0.00001, pt.getLng()+(-dy/len)*offsetPx*0.00001);
  });
}

function drawMap(stops, segs, stepInfoList) {
  clearMap();
  segs.forEach((seg,i)=>{
    const color = i<segs.length-1 ? stops[i+1].color : '#888888';
    const path  = offsetPath(seg.path, i%2===0?2.5:-2.5);
    if (path&&path.length>1) {
      polylines.push(new kakao.maps.Polyline({
        map, path, strokeWeight:5, strokeOpacity:0.9, strokeColor:color, strokeStyle:'solid'
      }));
    }
    const mid = path&&path.length>1 ? path[Math.floor(path.length/2)]
      : new kakao.maps.LatLng((stops[i].lat+stops[i+1].lat)/2,(stops[i].lng+stops[i+1].lng)/2);
    infoOverlays.push(new kakao.maps.CustomOverlay({
      map, position:mid,
      content:`<div style="background:rgba(255,255,255,0.93);border:1px solid #ddd;border-radius:10px;padding:3px 8px;font-size:11px;font-weight:600;color:#444;white-space:nowrap;box-shadow:0 1px 4px rgba(0,0,0,0.15)">🚗 ${fmtMins(seg.duration)}</div>`,
      yAnchor:1.5
    }));
  });

  stops.forEach((c,i)=>{
    const isHome=i===0, isDest=i===stops.length-1;
    const color = isHome||isDest ? '#444444' : c.color;
    const label = isHome?'집':isDest?'도착':String(i);
    const size  = isHome||isDest?32:28;
    customOverlays.push(new kakao.maps.CustomOverlay({
      map, position:new kakao.maps.LatLng(c.lat,c.lng),
      content:`<div style="background:${color};color:white;width:${size}px;height:${size}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${isHome||isDest?11:12}px;font-weight:700;border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3)">${label}</div>`,
      yAnchor:0.5, xAnchor:0.5
    }));
    if (!isHome&&!isDest) {
      const si = stepInfoList[i-1];
      if (si) infoOverlays.push(new kakao.maps.CustomOverlay({
        map, position:new kakao.maps.LatLng(c.lat,c.lng),
        content:`<div style="background:white;border:1.5px solid ${color};border-radius:10px;padding:6px 10px;font-size:11px;line-height:1.6;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.15);text-align:left"><div style="font-weight:700;color:${color}">${escHtml(si.name)}</div><div style="color:#555">도착 ${si.arrive} · 완료 ${si.done}</div><div style="color:#888">작업 ${fmtMins(si.dur)}</div><div style="text-align:center;margin-top:2px;color:${color};font-size:10px">▼</div></div>`,
        yAnchor:2.2, xAnchor:0.5
      }));
    }
  });

  const bounds=new kakao.maps.LatLngBounds();
  stops.forEach(c=>bounds.extend(new kakao.maps.LatLng(c.lat,c.lng)));
  map.setBounds(bounds);
}

function drawMiniMap(stops) {
  const wrap=document.getElementById('mobile-minimap');
  const svg=document.getElementById('mini-map');
  const W=268,H=160,PAD=24;
  const lats=stops.map(s=>s.lat),lngs=stops.map(s=>s.lng);
  const minLat=Math.min(...lats),maxLat=Math.max(...lats);
  const minLng=Math.min(...lngs),maxLng=Math.max(...lngs);
  const rx=maxLng-minLng||0.001,ry=maxLat-minLat||0.001;
  const sx=(W-PAD*2)/rx,sy=(H-PAD*2)/ry;
  const toX=lng=>PAD+(lng-minLng)*sx;
  const toY=lat=>H-PAD-(lat-minLat)*sy;
  let lines='',circles='',labels='';
  for(let i=0;i<stops.length-1;i++){
    const color=(i===stops.length-2)?'#888':stops[i+1].color||'#2d6a4f';
    lines+=`<line x1="${toX(stops[i].lng)}" y1="${toY(stops[i].lat)}" x2="${toX(stops[i+1].lng)}" y2="${toY(stops[i+1].lat)}" stroke="${color}" stroke-width="2.5" opacity="0.85"/>`;
  }
  stops.forEach((c,i)=>{
    const isHome=i===0,isDest=i===stops.length-1;
    const color=isHome||isDest?'#444':c.color;
    const lbl=isHome?'S':isDest?'E':String(i);
    const x=toX(c.lng),y=toY(c.lat),r=isHome||isDest?9:7;
    circles+=`<circle cx="${x}" cy="${y}" r="${r}" fill="${color}" stroke="white" stroke-width="1.5"/>`;
    labels+=`<text x="${x}" y="${y+3.5}" text-anchor="middle" font-size="8" fill="white" font-weight="bold">${lbl}</text>`;
  });
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.innerHTML=`<rect width="${W}" height="${H}" fill="#f0ede8"/>${lines}${circles}${labels}`;
}

async function autoSort() {
  const empty=locs.find(l=>!l.addr.trim());
  if (empty) return alert(`"${empty.name}"의 주소를 먼저 입력해주세요.`);
  const btn=document.getElementById('btn-tsp');
  btn.disabled=true; btn.textContent='⏳ 계산 중...';
  try {
    const homeAddr=document.getElementById('home-addr').value.trim();
    const coords=await Promise.all(locs.map(l=>geocodeAddr(l.addr)));
    const homeCoord=homeAddr?await geocodeAddr(homeAddr):coords[0];
    const n=coords.length;
    const visited=new Set(),order=[];
    let cur=homeCoord;
    while(order.length<n){
      let best=-1,bestD=Infinity;
      for(let j=0;j<n;j++){
        if(!visited.has(j)){const d=estimateMins(cur,coords[j]);if(d<bestD){bestD=d;best=j;}}
      }
      visited.add(best);order.push(best);cur=coords[best];
    }
    locs=order.map(i=>locs[i]);
    renderList();saveData();
    showToast('✅ 최적 순서로 정렬됐어요!');
  } catch(e){alert('정렬 오류: '+e.message);}
  finally{btn.disabled=false;btn.textContent='🔀 최적 순서';}
}

// 메인 계산
async function calculate() {
  const homeAddr = document.getElementById('home-addr').value.trim();
  const dep      = document.getElementById('departure').value;
  const bufVal   = parseInt(document.getElementById('buffer').value)||0;
  const destType = getDestType();
  const destAddrVal = document.getElementById('dest-addr').value.trim();

  if (!homeAddr) return alert('출발지 주소를 입력해주세요.');
  if (destType==='custom'&&!destAddrVal) return alert('도착지 주소를 입력해주세요.');
  const empty=locs.find(l=>!l.addr.trim());
  if (empty) return alert(`"${empty.name}"의 주소를 입력해주세요.`);

  document.getElementById('btn-calc').disabled=true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('error-msg').classList.remove('show');

  try {
    document.getElementById('loading-text').textContent='주소 변환 중...';
    const homeCoord = await geocodeAddr(homeAddr);
    const locCoords = await Promise.all(locs.map(l=>geocodeAddr(l.addr)));

    let destCoord;
    if (destType==='home') destCoord = homeCoord;
    else if (destType==='last') destCoord = locCoords[locCoords.length-1];
    else destCoord = await geocodeAddr(destAddrVal);

    document.getElementById('loading-text').textContent='경로 계산 중...';

    // 현재 순서대로 계산 (TSP 없음)
    const orderedCoords = [homeCoord, ...locCoords];
    const segDirs = [];
    for (let i=0;i<orderedCoords.length-1;i++)
      segDirs.push(await getDirections(orderedCoords[i],orderedCoords[i+1]));

    // 마지막 현장이 도착지면 마지막 이동 없음
    let lastDir = null;
    if (destType!=='last') {
      lastDir = await getDirections(orderedCoords[orderedCoords.length-1], destCoord);
      segDirs.push(lastDir);
    }

    const stops = [
      {...homeCoord, color:'#444444'},
      ...locs.map((loc,i)=>({...locCoords[i], color:loc.color})),
      ...(destType!=='last' ? [{...destCoord, color:'#444444'}] : [])
    ];

    // 여유시간 반영
    let ct = addMins(dep, bufVal);
    let totalTravel=0;
    const totalWork=locs.reduce((s,l)=>s+l.dur,0);
    const stepInfoList=[];

    for(let i=0;i<locs.length;i++){
      const dir=segDirs[i];
      totalTravel+=dir.duration;
      ct=addMins(ct,dir.duration);
      const arrive=ct;
      ct=addMins(ct,locs[i].dur);
      stepInfoList.push({name:locs[i].name,arrive,done:ct,dur:locs[i].dur});
    }
    if (lastDir) { totalTravel+=lastDir.duration; ct=addMins(ct,lastDir.duration); }

    drawMap(stops, segDirs, stepInfoList);
    drawMiniMap(stops);

    // 통계
    document.getElementById('stats').innerHTML=`
      <div class="stat"><div class="stat-val">${fmtMins(totalTravel)}</div><div class="stat-lbl">총 이동시간</div></div>
      <div class="stat"><div class="stat-val">${fmtMins(totalWork)}</div><div class="stat-lbl">총 작업시간</div></div>
      <div class="stat"><div class="stat-val">${ct}</div><div class="stat-lbl">${destType==='last'?'작업 완료':destType==='home'?'예상 귀가':'도착 예상'}</div></div>`;

    // 타임라인
    const actualStart = addMins(dep, bufVal);
    const steps=[{
      name:'출발',
      detail:`${homeAddr}${bufVal>0?` · ${actualStart} 출발 (여유 ${bufVal}분)`:''}`,
      color:'#444444'
    }];
    stepInfoList.forEach((s,i)=>{
      steps.push({
        name:s.name,
        detail:`도착 ${s.arrive} · 작업 ${fmtMins(s.dur)} · 완료 ${s.done}`,
        travelInfo:`${fmtMins(segDirs[i].duration)}`,
        color:locs[i].color
      });
    });
    if (destType==='last') {
      // 마지막 현장이 도착지 - 별도 귀가 행 없음
    } else {
      const destLabel = destType==='home' ? '귀가' : '도착';
      steps.push({name:destLabel, detail:`${ct} 도착 · 이동 ${fmtMins(lastDir.duration)}`, color:'#444444'});
    }

    lastResult = {
      dep, bufVal, steps, totalTravel, totalWork, destType,
      orderedAddrs: locs.map(l=>l.addr),
      destAddr: destAddrVal
    };

    const tlEl=document.getElementById('timeline'); tlEl.innerHTML='';
    steps.forEach((s,si)=>{
      const isLast=si===steps.length-1;
      const div=document.createElement('div'); div.className='tl-item';
      div.innerHTML=`
        <div class="tl-left">
          <div class="tl-dot" style="background:${s.color}"></div>
          ${!isLast?'<div class="tl-line"></div>':''}
        </div>
        <div class="tl-body">
          <div class="tl-name">${escHtml(s.name)}${s.travelInfo
            ?` <span style="font-size:10px;color:var(--text-muted);font-weight:400">(이동 ${s.travelInfo})</span>`
            :''}</div>
          <div class="tl-detail">${s.detail}</div>
        </div>`;
      tlEl.appendChild(div);
    });

    // 결과 패널 열기
    document.getElementById('result-panel').classList.add('show');
    setTimeout(()=>{ if(map) map.relayout(); }, 100);
    if (window.innerWidth<=768)
      document.getElementById('result-panel').scrollIntoView({behavior:'smooth'});

  } catch(e){
    const el=document.getElementById('error-msg');
    el.textContent=`오류: ${e.message}`; el.classList.add('show');
  } finally {
    document.getElementById('btn-calc').disabled=false;
    document.getElementById('loading').classList.remove('show');
    document.getElementById('loading-text').textContent='경로 계산 중...';
  }
}

(function(){
  const s=document.createElement('script');
  s.src=`https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_KEY}&libraries=services&autoload=false`;
  s.onload=()=>kakao.maps.load(()=>{
    loadData(); initMap(); renderList();
    ['home-addr','departure','buffer'].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.addEventListener('change',saveData);
    });
    setTimeout(()=>{ if(map){map.relayout();map.setCenter(new kakao.maps.LatLng(37.4563,127.1313));} },300);
    const params=new URLSearchParams(location.search);
    if(params.get('share')==='1') setTimeout(()=>calculate(),600);
  });
  document.head.appendChild(s);
})();
</script>
</body>
</html>
